<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#070b12"><title>Min-Max Tracker</title><style>
:root{--bg:#070b12;--bg2:#0c1220;--card:#111827;--card2:#151f31;--ink:#f3f7ff;--muted:#9aa6b8;--line:#263247;--accent:#8fb8ff;--field:#0b111c}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;background:linear-gradient(180deg,var(--bg),var(--bg2));color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;font-size:15px}body{padding:env(safe-area-inset-top) 0 calc(86px + env(safe-area-inset-bottom))}.app{max-width:560px;margin:0 auto;padding:14px}header{padding:12px 2px 6px}h1{font-size:26px;letter-spacing:-.04em;margin:0;font-weight:950}.card{background:linear-gradient(180deg,var(--card),#0f1726);border:1px solid var(--line);border-radius:22px;box-shadow:0 14px 32px rgba(0,0,0,.24);padding:14px;margin:12px 0}.title{font-size:18px;font-weight:900;line-height:1.15}.meta{color:var(--muted);font-size:13px;line-height:1.35;margin-top:6px}button,input,select,textarea{font:inherit}button{border:1px solid var(--line);background:#121d2e;color:var(--ink);border-radius:16px;min-height:46px;padding:10px 12px;font-weight:850}button.primary,button.active{background:linear-gradient(135deg,#2e63bb,#6b48c8);border-color:#6686ff;color:#fff}.weekbar{display:grid;grid-template-columns:48px 1fr 48px;gap:8px;align-items:center}.weekbox{text-align:center;background:var(--field);border:1px solid var(--line);border-radius:18px;padding:10px}.weekbox span,label{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.07em;font-weight:900;margin:0 0 5px}.weekbox b{font-size:22px}.dayrow{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:10px}.dayrow button{font-size:12px;min-height:42px;padding:8px 3px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;min-height:46px;padding:10px 11px;background:var(--field);color:var(--ink);outline:none}select.choice{margin-top:10px;background:#101a2b;border-color:#334762;font-weight:850}.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:12px}textarea{min-height:78px}.pill{display:inline-block;background:#182437;border:1px solid #2c3c56;border-radius:999px;padding:5px 8px;margin:6px 4px 0 0;font-size:12px;color:#d7e6ff;font-weight:850}.links{display:grid;gap:7px;margin-top:10px}.links a,.nolink{display:block;padding:10px 11px;background:#0d1625;border:1px solid #2b3a52;border-radius:14px;color:#b9d2ff;text-decoration:none;font-weight:850;font-size:13px}.nolink{color:var(--muted)}.altTitle{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.06em;font-weight:900;margin-top:12px}.bottom{position:fixed;left:0;right:0;bottom:0;background:rgba(8,12,20,.94);backdrop-filter:blur(14px);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px max(8px,env(safe-area-inset-left)) calc(8px + env(safe-area-inset-bottom)) max(8px,env(safe-area-inset-right));z-index:20}.bottom button{font-size:11.5px;line-height:1.1;min-height:50px;padding:8px 4px}.hidden{display:none!important}.savebar{position:sticky;top:0;z-index:10;background:rgba(7,11,18,.88);backdrop-filter:blur(10px);padding:8px 0}.savebar button{width:100%}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px}.kpi{background:var(--card2);border:1px solid var(--line);border-radius:18px;padding:14px}.kpi b{font-size:24px}.toast{position:fixed;left:16px;right:16px;bottom:94px;background:#edf4ff;color:#07101f;padding:12px 14px;border-radius:16px;text-align:center;font-weight:900;opacity:0;transform:translateY(10px);transition:.2s;z-index:50}.toast.show{opacity:1;transform:translateY(0)}canvas{width:100%;height:210px;background:var(--field);border:1px solid var(--line);border-radius:16px}@media(max-width:360px){.grid{grid-template-columns:1fr 1fr}.dayrow button{font-size:11px}h1{font-size:24px}}
</style></head><body><div class="app"><header><h1>Min-Max Tracker</h1></header><section id="workout"></section><section id="plan" class="hidden"></section><section id="analytics" class="hidden"></section><section id="settings" class="hidden"></section></div><nav class="bottom"><button data-v="workout" class="active">Log<br>Workout</button><button data-v="plan">Plan<br>Links</button><button data-v="analytics">Stats<br>Progress</button><button data-v="settings">Backup<br>Settings</button></nav><input id="importer" type="file" accept="application/json" hidden><div id="toast" class="toast"></div><script>
const BASE={"Full Body":[{"name":"Lying Leg Curl","technique":"N/A","warmup":"1-2","sets":"2","reps":"6-8","rir1":"1","rir2":"0","rest":"1-2 min","notes":"Set the machine so that you get the biggest stretch possible at the bottom. Prevent your butt from popping up as you curl. ","link":"https://youtu.be/y28L1m1PYUQ","alts":[{"name":"Seated Leg Curl","link":"https://youtu.be/oWJBLChYZOQ"},{"name":"Nordic Ham Curl","link":"https://youtu.be/UbNb5Tsl46c"}]},{"name":"Squat (Your Choice)","technique":"N/A","warmup":"2-4","sets":"2","reps":"6-8","rir1":"3","rir2":"2","rest":"3-5 min","notes":"This can be a Barbell Back Squat, Barbell Front Squat, Pendulum Squat, Hack Squat, Belt Squat, or Smith Machine Squat.","link":"https://youtu.be/v3N4tpPpmyQ","alts":[{"name":"See Notes","link":""},{"name":"See Notes","link":""}]},{"name":"Barbell Incline Press","technique":"N/A","warmup":"2-4","sets":"2","reps":"6-8","rir1":"2","rir2":"1","rest":"3-5 min","notes":"A 30° or 45° bench will work here. Pause for 1 second at the bottom of each rep while maintaining tension on the pecs.","link":"https://youtu.be/ad0NL7TH2-I","alts":[{"name":"Smith Machine Incline Press","link":"https://youtu.be/q3agRhqt_WA"},{"name":"DB Incline Press","link":"https://youtu.be/dhSKkQdUzoA"}]},{"name":"Incline DB Y-Raise","technique":"N/A","warmup":"0-1","sets":"1","reps":"8-10","rir1":"0","rir2":"N/A","rest":"1-2 min","notes":"Use a 30° incline bench (back against the bench) and lift the weight up and out in a Y shape.","link":"https://youtu.be/xaOQJjzNrd8","alts":[{"name":"Cable Y-Raise","link":"https://youtu.be/xxnjF6ljHmg"},{"name":"Machine Lateral Raise","link":"https://youtu.be/nc6pAci8Tpg"}]},{"name":"Pull-Up (Wide Grip)","technique":"N/A","warmup":"1-2","sets":"2","reps":"6-8","rir1":"2","rir2":"1","rest":"2-3 min","notes":"Control the negative and feel your lats pulling apart. Full ROM!","link":"https://youtu.be/oB27u_w3pX4","alts":[{"name":"Lat Pulldown (Wide Grip)","link":"https://youtu.be/nDl3VjkLPQE"},{"name":"1-Arm Cable Pulldown","link":"https://youtu.be/01pnZt1uVFI"}]},{"name":"Standing Calf Raise","technique":"N/A","warmup":"0-1","sets":"1","reps":"6-8","rir1":"0","rir2":"N/A","rest":"1-2 min","notes":"1-2 second pause at the bottom of each rep. Instead of just going up onto your toes, think about rolling your ankle back and forth on the balls of your feet.","link":"https://youtu.be/WMkCGNwo5ts","alts":[{"name":"Leg Press Calf Press","link":"https://youtu.be/-mcxziH_KdM"},{"name":"Donkey Calf Raise","link":"https://youtu.be/LC9SO-pIXqA"}]}],"Upper":[{"name":"Close-Grip Lat Pulldown","technique":"N/A","warmup":"2-3","sets":"2","reps":"8-10","rir1":"2","rir2":"1","rest":"2-3 min","notes":"Lean back by ~15° and drive your elbows down as you squeeze your shoulder blades together. This should feel like a mix of lats and mid-traps.","link":"https://youtu.be/7l859qd4E48","alts":[{"name":"Close-Grip Pull-Up","link":"https://youtu.be/3DnqKKfz6wY"},{"name":"1-Arm Cable Pulldown","link":"https://youtu.be/01pnZt1uVFI"}]},{"name":"Chest-Supported T-Bar Row","technique":"N/A","warmup":"2-3","sets":"2","reps":"8-10","rir1":"2","rir2":"1","rest":"2-3 min","notes":"Flare elbows out at roughly 45° and squeeze your shoulder blades together hard at the top of each rep.","link":"https://youtu.be/-FAxUZoPDc4","alts":[{"name":"Chest-Supported Machine Row","link":"https://youtu.be/QZ7VZpjNTG8"},{"name":"Chest-Supported DB Row","link":"https://youtu.be/Cmcv44jiQd0"}]},{"name":"Machine Shrug","technique":"N/A","warmup":"1-2","sets":"1","reps":"6-8","rir1":"1","rir2":"N/A","rest":"1-2 min","notes":"Think about shrugging \"up to your ears\". Use straps, if possible.","link":"https://youtu.be/2KDc6iAcrAw","alts":[{"name":"Barbell Shrug","link":"https://youtu.be/CQDTdasj9BA"},{"name":"Cable Shrug-In","link":"https://youtu.be/0EqU6-o3PAw"}]},{"name":"Machine Chest Press","technique":"N/A","warmup":"2-4","sets":"2","reps":"8-10","rir1":"2","rir2":"1","rest":"3-5 min","notes":"1 second pause at the bottom of each rep while maintaining tension on the pecs.","link":"https://youtu.be/qTSTOVVr8rU","alts":[{"name":"Smith Machine Bench Press","link":"https://youtu.be/cJ8JrXUQ3xQ"},{"name":"DB Bench Press","link":"https://youtu.be/qmyToaabqdQ"}]},{"name":"High-Cable Lateral Raise","technique":"N/A","warmup":"0-1","sets":"2","reps":"8-10","rir1":"1","rir2":"0","rest":"1-2 min","notes":"Set the cable at roughly hip height. Let your hand go slightly past your midline at the bottom of each rep to get a deep stretch on the side delt.","link":"https://youtu.be/DX1WzS7k0Uc","alts":[{"name":"DB Lateral Raise","link":"https://youtu.be/Z8OrSIk_574"},{"name":"Machine Lateral Raise","link":"https://youtu.be/nc6pAci8Tpg"}]},{"name":"1-Arm Reverse Pec Deck","technique":"N/A","warmup":"0-1","sets":"1","reps":"8-10","rir1":"0","rir2":"N/A","rest":"1-2 min","notes":"Sweep the weight out to create the largest semi-circle possible with your arm.","link":"https://youtu.be/WkI6IHmYORY","alts":[{"name":"Lying Reverse DB Flye","link":"https://youtu.be/MXGZHJFQ9bE"},{"name":"Reverse Cable Crossover","link":"https://youtu.be/STZ3Twq5fgc"}]},{"name":"Cable Crunch","technique":"N/A","warmup":"0-1","sets":"2","reps":"6-8","rir1":"1","rir2":"0","rest":"1-2 min","notes":"Round your lower back as you crunch. Maintain a mind-muscle connection with your 6-pack.","link":"https://youtu.be/LvJM9V3D_CQ","alts":[{"name":"Weighted Crunch","link":"https://youtu.be/Q_n8cSQLhog"},{"name":"Machine Crunch","link":"https://youtu.be/KlxdhDSi5Dc"}]}],"Lower":[{"name":"Leg Extension","technique":"N/A","warmup":"1-2","sets":"2","reps":"8-10","rir1":"1","rir2":"0","rest":"1-2 min","notes":"Set the seat back as far as it will go while still feeling comfortable. Grab the handles as hard as you can to pull your butt down into the seat (using straps can help here).","link":"https://youtu.be/G0_M9LBCT0o","alts":[{"name":"Reverse Nordic","link":"https://youtu.be/aHS9tKzJXik"},{"name":"Sissy Squat","link":"https://youtu.be/Ma99aw-VDJQ"}]},{"name":"Barbell RDL","technique":"N/A","warmup":"2-3","sets":"2","reps":"6-8","rir1":"3","rir2":"2","rest":"2-3 min","notes":"Stick your glutes straight back as you lower the bar straight down, centered over the middle of your foot. Get a nice deep stretch at the bottom, but keep your spine neutral (don't round forward).","link":"https://youtu.be/xbnan2iNh-Q","alts":[{"name":"DB RDL","link":"https://youtu.be/CaryZp20CuI"},{"name":"Seated Cable Deadlift","link":"https://youtu.be/FCe6PIQbB-s"}]},{"name":"Machine Hip Thrust","technique":"N/A","warmup":"2-4","sets":"2","reps":"6-8","rir1":"2","rir2":"1","rest":"2-3 min","notes":"Squeeze your glutes hard at the top and control the weight on the way down.","link":"https://youtu.be/ELgSmlwFsFQ","alts":[{"name":"Barbell Hip Thrust","link":"https://youtu.be/8RwbLtfLu6A"},{"name":"45° Hyperextension","link":"https://youtu.be/1Rr1-FW6ZJs"}]},{"name":"Leg Press","technique":"N/A","warmup":"2-4","sets":"1","reps":"6-8","rir1":"1","rir2":"N/A","rest":"2-3 min","notes":"Feet lower on the platform for more quad focus. Get as deep as you can without excessive back rounding.","link":"https://youtu.be/ksBaBSfmZf4","alts":[{"name":"Smith Machine Squat","link":"https://youtu.be/wSHxfQJe1ic"},{"name":"Barbell Squat","link":"https://youtu.be/UGwmUJkTIx8"}]},{"name":"Standing Calf Raise","technique":"N/A","warmup":"0-1","sets":"2","reps":"8-10","rir1":"1","rir2":"0","rest":"1-2 min","notes":"1-2 second pause at the bottom of each rep. Instead of just going up onto your toes, think about rolling your ankle back and forth on the balls of your feet.","link":"https://youtu.be/WMkCGNwo5ts","alts":[{"name":"Leg Press Calf Press","link":"https://youtu.be/-mcxziH_KdM"},{"name":"Donkey Calf Raise","link":"https://youtu.be/LC9SO-pIXqA"}]}],"Arms/Delts":[{"name":"Bayesian Cable Curl","technique":"N/A","warmup":"0-1","sets":"2","reps":"6-8","rir1":"1","rir2":"0","rest":"1-2 min","notes":"As you curl, optionally lean forward to prevent the cable from hitting your wrist at the top. Control the negative and feel a deep stretch at the bottom of each rep.","link":"https://youtu.be/_w_Uan2dG-4","alts":[{"name":"Incline DB Curl","link":"https://youtu.be/Nf1_Ok0LDcI"},{"name":"Standing DB Curl","link":"https://youtu.be/vneVQlN7LR4"}]},{"name":"Overhead Cable Triceps Extension","technique":"N/A","warmup":"0-1","sets":"2","reps":"8-10","rir1":"1","rir2":"0","rest":"1-2 min","notes":"Feel a deep stretch on the triceps throughout the entire negative. ","link":"https://youtu.be/7GvY7yTEepM","alts":[{"name":"Overhead DB Triceps Extension","link":"https://youtu.be/5KX0EjOTMaI"},{"name":"Skull Crusher","link":"https://youtu.be/1n6xrEI5g0Q"}]},{"name":"Modified Zottman Curl","technique":"N/A","warmup":"0-1","sets":"1","reps":"8-10","rir1":"0","rir2":"N/A","rest":"1-2 min","notes":"Hammer curl on the way up and supinated curl (palms up) on the way down.","link":"https://youtu.be/J0l0qQCy80Q","alts":[{"name":"DB Hammer Curl","link":"https://youtu.be/AS4FeNiHyKg"},{"name":"Preacher Hammer Curl","link":"https://youtu.be/sInGFVj-bJA"}]},{"name":"Cable Triceps Kickback","technique":"N/A","warmup":"0-1","sets":"2","reps":"8-10","rir1":"1","rir2":"0","rest":"1-2 min","notes":"Keep your upper arm behind your torso throughout the ROM.","link":"https://youtu.be/FGJ64JyKod0","alts":[{"name":"Seated Dip Machine","link":"https://youtu.be/BRueufxDP2Q"},{"name":"Close-Grip Dip","link":"https://youtu.be/G7bonPtkitM"}]},{"name":"DB Wrist Curl","technique":"N/A","warmup":"0-1","sets":"2","reps":"8-10","rir1":"1","rir2":"0","rest":"1-2 min","notes":"Smooth, controlled reps.","link":"https://youtu.be/HJx1sIZKDqk","alts":[{"name":"Cable Wrist Curl","link":"https://youtu.be/S9NEwbiYEBE"}]},{"name":"DB Wrist Extension","technique":"N/A","warmup":"0-1","sets":"2","reps":"8-10","rir1":"1","rir2":"0","rest":"1-2 min","notes":"Smooth, controlled reps.","link":"https://youtu.be/uCAoI5FnLhs","alts":[{"name":"Cable Wrist Extension","link":"https://youtu.be/_KI-O0zMv60"}]},{"name":"Alternating DB Curl","technique":"N/A","warmup":"0-1","sets":"1","reps":"6-8","rir1":"0","rir2":"N/A","rest":"1-2 min","notes":"Slow, controlled reps!","link":"https://youtu.be/kSxgX6HIYxQ","alts":[{"name":"Barbell Curl","link":"https://youtu.be/UvxrIuG-Xeg"},{"name":"EZ-Bar Curl","link":"https://youtu.be/wXjPZdhUzBQ"}]},{"name":"Machine Lateral Raise","technique":"N/A","warmup":"0-1","sets":"2","reps":"8-10","rir1":"1","rir2":"0","rest":"1-2 min","notes":"Focus on squeezing your side delt to move the weight.","link":"https://youtu.be/nc6pAci8Tpg","alts":[{"name":"High-Cable Lateral Raise","link":"https://youtu.be/DX1WzS7k0Uc"},{"name":"DB Lateral Raise","link":"https://youtu.be/Z8OrSIk_574"}]},{"name":"Dead Hang (optional)","technique":"N/A","warmup":"0-1","sets":"2","reps":"N/A","rir1":"0","rir2":"0","rest":"1-2 min","notes":"Try to add a few more seconds each week!","link":"https://youtu.be/5M8uPbfQsbg","alts":[]}]};
const SESS=[['Full','Full Body'],['Upper','Upper'],['Lower','Lower'],['Arms','Arms/Delts']];let state={week:1,session:0,logs:{},bw:{},units:'lb',swaps:{}};function $(id){return document.getElementById(id)}function day(){return SESS[state.session][1]}function exs(){return BASE[day()]||[]}function key(i){return `w${state.week}s${state.session}e${i}`}function toast(t){$('toast').textContent=t;$('toast').className='toast show';setTimeout(()=>$('toast').className='toast',1300)}function save(show){localStorage.setItem('rookieMinMax',JSON.stringify(state));if(show)toast('Saved')}function load(){try{state=Object.assign(state,JSON.parse(localStorage.getItem('rookieMinMax')||'{}'))}catch(e){}if(!state.swaps)state.swaps={}}function opts(e){return [{name:e.name,link:e.link||''}].concat((e.alts||[]).filter(a=>a.name&&a.name!='N/A'))}function cur(e,i){return opts(e)[+(state.swaps[key(i)]||0)]||opts(e)[0]}function lnk(t,u){return u?`<a target=_blank rel=noopener href="${u}">${t}</a>`:`<span class=nolink>${t}</span>`}window.weekStep=d=>{state.week=Math.min(12,Math.max(1,state.week+d));renderWorkout();save()};window.setSession=i=>{state.session=i;renderWorkout();save()};window.sw=(i,v)=>{state.swaps[key(i)]=+v;save();renderWorkout()};function choices(e,i){let o=opts(e),sel=+(state.swaps[key(i)]||0);if(o.length<2)return'';let h='<label style="margin-top:12px">Exercise Choice</label><select class=choice onchange="sw('+i+',this.value)">';o.forEach((x,n)=>h+=`<option value="${n}" ${n==sel?'selected':''}>${n?'Alt: ':'Main: '}${x.name}</option>`);return h+'</select><div class=meta>Switching keeps the same set/reps/RIR target and saves locally.</div>'}function links(e){let o=opts(e),h='<div class=links>'+lnk('Main demo: '+e.name,e.link)+'</div>';if(o.length>1){h+='<div class=altTitle>Alternates</div><div class=links>';o.slice(1).forEach(a=>h+=lnk(a.name,a.link));h+='</div>'}return h}
function renderWorkout(){let h=`<div class=savebar><button class=primary onclick="save(true)">Save Workout</button></div><div class=card><label>Week</label><div class=weekbar><button onclick="weekStep(-1)">‹</button><div class=weekbox><span>Week</span><b>${state.week}</b></div><button onclick="weekStep(1)">›</button></div><label style="margin-top:12px">Workout Day</label><div class=dayrow>`;SESS.forEach((s,i)=>h+=`<button class="${i===state.session?'active':''}" onclick="setSession(${i})">${s[0]}</button>`);h+=`</div><div style="margin-top:12px"><label>Bodyweight (${state.units})</label><input inputmode=decimal value="${state.bw[state.week]||''}" oninput="state.bw[state.week]=this.value;save()" placeholder="Optional"></div></div>`;exs().forEach((e,i)=>{let L=state.logs[key(i)]||{},c=cur(e,i);h+=`<div class=card><div class=title>${c.name}</div><div><span class=pill>${e.sets} sets</span><span class=pill>${e.reps} reps</span><span class=pill>RIR ${e.rir1}${e.rir2&&e.rir2!='N/A'?'/'+e.rir2:''}</span><span class=pill>${e.rest}</span></div>${choices(e,i)}<div class=grid><div><label>Set 1 Load</label><input inputmode=decimal data-i=${i} data-f=l1 value="${L.l1||''}"></div><div><label>Set 1 Reps</label><input inputmode=numeric data-i=${i} data-f=r1 value="${L.r1||''}"></div><div><label>Set 1 RIR</label><input inputmode=decimal data-i=${i} data-f=rir1 value="${L.rir1||''}"></div><div><label>Set 2 Load</label><input inputmode=decimal data-i=${i} data-f=l2 value="${L.l2||''}"></div><div><label>Set 2 Reps</label><input inputmode=numeric data-i=${i} data-f=r2 value="${L.r2||''}"></div><div><label>Set 2 RIR</label><input inputmode=decimal data-i=${i} data-f=rir2 value="${L.rir2||''}"></div></div><label style="margin-top:12px">Notes</label><textarea data-i=${i} data-f=notes>${L.notes||''}</textarea>${links(e)}<p class=meta>${e.notes||''}</p></div>`});$('workout').innerHTML=h;document.querySelectorAll('[data-i]').forEach(el=>el.oninput=()=>{let x=key(el.dataset.i);state.logs[x]=state.logs[x]||{};state.logs[x][el.dataset.f]=el.value;save()})}
function volume(){let v=Array(12).fill(0);for(let w=1;w<=12;w++)for(let s=0;s<SESS.length;s++)(BASE[SESS[s][1]]||[]).forEach((e,i)=>{let L=state.logs[`w${w}s${s}e${i}`]||{};v[w-1]+=(+L.l1||0)*(+L.r1||0)+(+L.l2||0)*(+L.r2||0)});return v}function e1rm(L){return Math.max((+L.l1||0)*(1+(+L.r1||0)/30),(+L.l2||0)*(1+(+L.r2||0)/30))}function chart(vals){let c=document.createElement('canvas'),ctx=c.getContext('2d');setTimeout(()=>{let w=c.width=c.clientWidth*2,h=c.height=210*2,p=36,m=Math.max(1,...vals);ctx.strokeStyle='#263247';ctx.lineWidth=2;for(let g=0;g<4;g++){let y=p+(h-p*2)*g/3;ctx.beginPath();ctx.moveTo(p,y);ctx.lineTo(w-p,y);ctx.stroke()}ctx.strokeStyle='#8fb8ff';ctx.lineWidth=5;ctx.beginPath();vals.forEach((v,i)=>{let x=p+(w-p*2)*i/11,y=h-p-(h-p*2)*v/m;i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.stroke();ctx.fillStyle='#9aa6b8';ctx.font='22px -apple-system';vals.forEach((v,i)=>{if(i%2===0)ctx.fillText('W'+(i+1),p+(w-p*2)*i/11-10,h-10)})},20);return c}function renderAnalytics(){let vols=volume(),total=Math.round(vols.reduce((a,b)=>a+b,0)),best=0;Object.values(state.logs).forEach(L=>best=Math.max(best,e1rm(L)));$('analytics').innerHTML=`<div class=card><div class=title>Analytics</div><p class=meta>Updates from saved logs on this phone.</p></div><div class=kpis><div class=kpi><b>${total}</b><br><span class=meta>Total volume</span></div><div class=kpi><b>${Math.round(best)}</b><br><span class=meta>Best e1RM</span></div></div><div class=card><div class=title>Weekly Volume</div><div id=volChart></div></div><div class=card><div class=title>Bodyweight</div><div id=bwChart></div></div>`;$('volChart').appendChild(chart(vols));$('bwChart').appendChild(chart(Array.from({length:12},(_,i)=>+state.bw[i+1]||0)))}function renderPlan(){let h='<div class=card><div class=title>Plan + Links</div><p class=meta>Exercises from the original Excel file with alternate options.</p></div>';SESS.forEach(s=>{h+=`<div class=card><div class=title>${s[1]}</div></div>`;(BASE[s[1]]||[]).forEach(e=>h+=`<div class=card><div class=title>${e.name}</div><div><span class=pill>${e.sets} sets</span><span class=pill>${e.reps} reps</span><span class=pill>${e.rest}</span></div><p class=meta>${e.notes||''}</p>${links(e)}</div>`)});$('plan').innerHTML=h}function renderSettings(){$('settings').innerHTML=`<div class=card><div class=title>Backup + Settings</div><p class=meta>Data saves locally on this phone/browser. Export a backup occasionally.</p><label>Units</label><select onchange="state.units=this.value;save(true);renderWorkout()"><option ${state.units==='lb'?'selected':''}>lb</option><option ${state.units==='kg'?'selected':''}>kg</option></select><button class=primary style="width:100%;margin-top:12px" onclick="save(true)">Save Now</button><button style="width:100%;margin-top:8px" onclick=exportData()>Export Backup</button><button style="width:100%;margin-top:8px" onclick="$('importer').click()">Import Backup</button></div>`}function exportData(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.download='minmax-backup.json';a.click()}$('importer').onchange=e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{state=JSON.parse(r.result);if(!state.swaps)state.swaps={};save();renderAll();toast('Imported')};r.readAsText(f)};function show(v){['workout','plan','analytics','settings'].forEach(x=>$(x).classList.toggle('hidden',x!==v));document.querySelectorAll('.bottom button').forEach(b=>b.classList.toggle('active',b.dataset.v===v));if(v==='workout')renderWorkout();if(v==='plan')renderPlan();if(v==='analytics')renderAnalytics();if(v==='settings')renderSettings();scrollTo(0,0)}document.querySelectorAll('.bottom button').forEach(b=>b.onclick=()=>show(b.dataset.v));function renderAll(){renderWorkout();renderPlan();renderAnalytics();renderSettings()}load();renderAll();
</script></body></html>
