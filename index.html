<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#070b12">
  <title>Min-Max Tracker</title>
  <link rel="stylesheet" href="style.css?v=4">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>Min-Max Tracker</h1>
      <button class="iconBtn" onclick="toggleTheme()" aria-label="Open colour settings">🎨</button>
    </header>
    <section id="workout"></section>
    <section id="plan" class="hidden"></section>
    <section id="analytics" class="hidden"></section>
    <section id="settings" class="hidden"></section>
  </div>
  <nav class="bottom">
    <button data-v="workout" class="active">Log<br>Workout</button>
    <button data-v="plan">Plan<br>Links</button>
    <button data-v="analytics">Stats<br>Progress</button>
    <button data-v="settings">Save<br>Export</button>
  </nav>
  <input id="importer" type="file" accept="application/json,.json,text/csv,.csv,.xls,.xlsx" hidden>
  <div id="toast" class="toast"></div>
  <script src="app.js?v=4"></script>
</body>
</html>
