<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#070b12">
<title>Min-Max Tracker</title>
<style>
:root{--bg:#070b12;--bg2:#0c1220;--card:#111827;--card2:#151f31;--ink:#f3f7ff;--muted:#9aa6b8;--line:#263247;--accent:#8fb8ff;--accent2:#b993ff;--field:#0b111c;--good:#7dd3a7}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;background:linear-gradient(180deg,var(--bg),var(--bg2));color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;font-size:15px}body{padding:env(safe-area-inset-top) 0 calc(86px + env(safe-area-inset-bottom))}.app{max-width:560px;margin:0 auto;padding:14px}header{padding:12px 2px 6px}h1{font-size:26px;letter-spacing:-.04em;margin:0;font-weight:950}.card{background:linear-gradient(180deg,var(--card),#0f1726);border:1px solid var(--line);border-radius:22px;box-shadow:0 14px 32px rgba(0,0,0,.24);padding:14px;margin:12px 0}.compact{padding:12px}.title{font-size:18px;font-weight:900;letter-spacing:-.02em}.meta{color:var(--muted);font-size:13px;line-height:1.35;margin-top:5px}.row{display:flex;gap:8px;overflow-x:auto;padding:2px 0}.dayrow{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:10px}button,input,select,textarea{font:inherit}button{border:1px solid var(--line);background:#121d2e;color:var(--ink);border-radius:16px;min-height:46px;padding:10px 12px;font-weight:850}button.primary,button.active{background:linear-gradient(135deg,#2e63bb,#6b48c8);border-color:#6686ff;color:#fff}.dayrow button{font-size:12.5px;min-height:42px;padding:8px 4px}.weekbar{display:grid;grid-template-columns:48px 1fr 48px;gap:8px;align-items:center}.weekbox{text-align:center;background:var(--field);border:1px solid var(--line);border-radius:18px;padding:10px}.weekbox b{display:block;font-size:22px}.weekbox span{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em;font-weight:800}label{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.07em;font-weight:900;margin:0 0 5px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;min-height:46px;padding:10px 11px;background:var(--field);color:var(--ink);outline:none}textarea{min-height:78px;resize:vertical}.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:12px}.pill{display:inline-block;background:#182437;border:1px solid #2c3c56;border-radius:999px;padding:5px 8px;margin:6px 4px 0 0;font-size:12px;color:#d7e6ff;font-weight:850}.links{display:grid;gap:7px;margin-top:10px}.links a{display:block;padding:10px 11px;background:#0d1625;border:1px solid #2b3a52;border-radius:14px;color:#b9d2ff;text-decoration:none;font-weight:850;font-size:13px}.altTitle{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.06em;font-weight:900;margin-top:12px}.bottom{position:fixed;left:0;right:0;bottom:0;background:rgba(8,12,20,.94);backdrop-filter:blur(14px);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px max(8px,env(safe-area-inset-left)) calc(8px + env(safe-area-inset-bottom)) max(8px,env(safe-area-inset-right));z-index:20}.bottom button{font-size:11.5px;line-height:1.1;min-height:50px;padding:8px 4px;border-radius:15px}.hidden{display:none!important}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px}.kpi{background:var(--card2);border:1px solid var(--line);border-radius:18px;padding:14px}.kpi b{font-size:24px}.toast{position:fixed;left:16px;right:16px;bottom:94px;background:#edf4ff;color:#07101f;padding:12px 14px;border-radius:16px;text-align:center;font-weight:900;opacity:0;transform:translateY(10px);transition:.2s;z-index:50}.toast.show{opacity:1;transform:translateY(0)}canvas{width:100%;height:210px;background:var(--field);border:1px solid var(--line);border-radius:16px}.savebar{position:sticky;top:0;z-index:10;margin:-2px 0 10px;background:rgba(7,11,18,.88);backdrop-filter:blur(10px);padding:8px 0}.savebar button{width:100%}@media(max-width:360px){.grid{grid-template-columns:1fr 1fr}.dayrow button{font-size:11.5px}h1{font-size:24px}}
</style>
</head>
<body>
<div class="app"><header><h1>Min-Max Tracker</h1></header><section id="workout"></section><section id="plan" class="hidden"></section><section id="analytics" class="hidden"></section><section id="settings" class="hidden"></section></div>
<nav class="bottom"><button data-v="workout" class="active">Log<br>Workout</button><button data-v="plan">Plan<br>Links</button><button data-v="analytics">Stats<br>Progress</button><button data-v="settings">Backup<br>Settings</button></nav><input id="importer" type="file" accept="application/json" hidden><div id="toast" class="toast"></div>
<script>
const EX=[
{name:'Lying Leg Curl',sets:2,reps:'6-8',rir:'1/0',rest:'1-2 min',link:'https://youtu.be/y28L1m1PYUQ',alts:[['Seated Leg Curl','https://youtu.be/Orxowest56U'],['Nordic Curl','https://youtu.be/OpRMRhr0Ycc']],notes:'Set the machine for a deep stretch. Keep hips down.'},
{name:'Squat - Your Choice',sets:2,reps:'6-8',rir:'3/2',rest:'3-5 min',link:'https://youtu.be/v3N4tpPpmyQ',alts:[['Hack Squat','https://youtu.be/0tn5K9NlCfo'],['Leg Press','https://youtu.be/yZmx_Ac3880'],['Goblet Squat','https://youtu.be/MeIiIdhvXT4']],notes:'Back squat, front squat, hack squat, belt squat, or Smith squat.'},
{name:'Barbell Incline Press',sets:2,reps:'6-8',rir:'2/1',rest:'3-5 min',link:'https://youtu.be/ad0NL7TH2-I',alts:[['DB Incline Press','https://youtu.be/8iPEnn-ltC8'],['Machine Chest Press','https://youtu.be/xUm0BiZCWlQ']],notes:'Pause one second at the bottom while maintaining pec tension.'},
{name:'Incline DB Y-Raise',sets:1,reps:'8-10',rir:'0',rest:'1-2 min',link:'https://youtu.be/xaOQJjzNrd8',alts:[['Cable Y-Raise','https://youtu.be/0v5eF6S-46E'],['Reverse Pec Deck','https://youtu.be/6e1D2d6C4cU']],notes:'Use a 30 degree incline bench and raise in a Y path.'},
{name:'Lat Pulldown',sets:2,reps:'8-10',rir:'2/1',rest:'2-3 min',link:'https://youtu.be/O94yEoGXtBY',alts:[['Assisted Pull-Up','https://youtu.be/ajdFwa-qM98'],['Straight-Arm Pulldown','https://youtu.be/45TgU0tGghM']],notes:'Drive elbows down and keep tension on the lats.'},
{name:'Romanian Deadlift',sets:2,reps:'6-8',rir:'2/1',rest:'3-5 min',link:'https://youtu.be/_oyxCn2iSjU',alts:[['DB Romanian Deadlift','https://youtu.be/hQgFixeXdZo'],['45 Degree Back Extension','https://youtu.be/ph3pddpKzzw']],notes:'Hinge at the hips and control the stretch.'},
{name:'Cable Row',sets:2,reps:'8-10',rir:'1/0',rest:'2-3 min',link:'https://youtu.be/GZbfZ033f74',alts:[['Chest-Supported Row','https://youtu.be/FS2lD_t3XbQ'],['One-Arm DB Row','https://youtu.be/DMo3HJoawrU']],notes:'Pull elbows back and avoid excessive momentum.'},
{name:'DB Lateral Raise',sets:2,reps:'10-15',rir:'1/0',rest:'1-2 min',link:'https://youtu.be/v_ZkxWzYnMc',alts:[['Cable Lateral Raise','https://youtu.be/PPrzBWZDOhA'],['Machine Lateral Raise','https://youtu.be/fD6kaKjiy84']],notes:'Lead with elbows and keep traps relaxed.'},
{name:'Leg Press',sets:2,reps:'8-10',rir:'2/1',rest:'3-5 min',link:'https://youtu.be/yZmx_Ac3880',alts:[['Hack Squat','https://youtu.be/0tn5K9NlCfo'],['Bulgarian Split Squat','https://youtu.be/2C-uNgKwPLE']],notes:'Use controlled depth and stable hips.'},
{name:'Cable Triceps Pressdown',sets:2,reps:'10-12',rir:'1/0',rest:'1-2 min',link:'https://youtu.be/6Fzep104f0s',alts:[['Overhead Cable Extension','https://youtu.be/ns-RGsbzqok'],['Skull Crusher','https://youtu.be/d_KZxkY_0cM']],notes:'Keep elbows fixed and extend fully.'},
{name:'Incline DB Curl',sets:2,reps:'10-12',rir:'1/0',rest:'1-2 min',link:'https://youtu.be/soxrZlIl35U',alts:[['Cable Curl','https://youtu.be/nFj8yZpv-kA'],['Preacher Curl','https://youtu.be/fIWP-FRFNU0']],notes:'Let biceps stretch at the bottom.'},
{name:'Standing Calf Raise',sets:2,reps:'8-12',rir:'1/0',rest:'1-2 min',link:'https://youtu.be/3UWi44yN-wM',alts:[['Seated Calf Raise','https://youtu.be/JbyjNymZOt0'],['Leg Press Calf Raise','https://youtu.be/BW0Jndz2Y2c']],notes:'Pause in the stretched and contracted positions.'}
];
const SESS=['Full A','Full B','Upper','Lower'];let state={week:1,session:0,logs:{},bw:{},units:'lb'};
function $(id){return document.getElementById(id)}function k(i){return `w${state.week}s${state.session}e${i}`}function toast(t){$('toast').textContent=t;$('toast').className='toast show';setTimeout(()=>$('toast').className='toast',1300)}function persist(show){localStorage.setItem('rookieMinMax',JSON.stringify(state));if(show)toast('Saved')}function load(){try{state=Object.assign(state,JSON.parse(localStorage.getItem('rookieMinMax')||'{}'))}catch(e){}}
window.weekStep=d=>{state.week=Math.min(12,Math.max(1,state.week+d));renderWorkout();persist()};window.setSession=i=>{state.session=i;renderWorkout();persist()};
function altLinks(ex){let h=`<div class=links><a target=_blank rel=noopener href="${ex.link}">Main demo</a></div><div class=altTitle>Alternates</div><div class=links>`;ex.alts.forEach(a=>h+=`<a target=_blank rel=noopener href="${a[1]}">${a[0]}</a>`);return h+'</div>'}
function renderWorkout(){let h=`<div class=savebar><button class=primary onclick="persist(true)">Save Workout</button></div><div class="card compact"><label>Week</label><div class=weekbar><button onclick="weekStep(-1)">‹</button><div class=weekbox><span>Week</span><b>${state.week}</b></div><button onclick="weekStep(1)">›</button></div><label style="margin-top:12px">Workout Day</label><div class=dayrow>`;SESS.forEach((s,i)=>h+=`<button class="${i===state.session?'active':''}" onclick="setSession(${i})">${s}</button>`);h+=`</div><div style="margin-top:12px"><label>Bodyweight (${state.units})</label><input inputmode=decimal value="${state.bw[state.week]||''}" oninput="state.bw[state.week]=this.value;persist()" placeholder="Optional"></div></div>`;EX.forEach((ex,i)=>{let L=state.logs[k(i)]||{};h+=`<div class=card><div class=title>${ex.name}</div><div><span class=pill>${ex.sets} sets</span><span class=pill>${ex.reps} reps</span><span class=pill>RIR ${ex.rir}</span><span class=pill>${ex.rest}</span></div><div class=grid><div><label>Set 1 Load</label><input inputmode=decimal data-i=${i} data-f=l1 value="${L.l1||''}"></div><div><label>Set 1 Reps</label><input inputmode=numeric data-i=${i} data-f=r1 value="${L.r1||''}"></div><div><label>Set 1 RIR</label><input inputmode=decimal data-i=${i} data-f=rir1 value="${L.rir1||''}"></div><div><label>Set 2 Load</label><input inputmode=decimal data-i=${i} data-f=l2 value="${L.l2||''}"></div><div><label>Set 2 Reps</label><input inputmode=numeric data-i=${i} data-f=r2 value="${L.r2||''}"></div><div><label>Set 2 RIR</label><input inputmode=decimal data-i=${i} data-f=rir2 value="${L.rir2||''}"></div></div><label style="margin-top:12px">Notes</label><textarea data-i=${i} data-f=notes>${L.notes||''}</textarea>${altLinks(ex)}<p class=meta>${ex.notes}</p></div>`});$('workout').innerHTML=h;document.querySelectorAll('[data-i]').forEach(el=>el.oninput=()=>{let x=k(el.dataset.i);state.logs[x]=state.logs[x]||{};state.logs[x][el.dataset.f]=el.value;persist()})}
function volume(){let v=Array(12).fill(0);for(let w=1;w<=12;w++)for(let s=0;s<4;s++)EX.forEach((ex,i)=>{let L=state.logs[`w${w}s${s}e${i}`]||{};v[w-1]+=(+L.l1||0)*(+L.r1||0)+(+L.l2||0)*(+L.r2||0)});return v}function e1rm(L){return Math.max((+L.l1||0)*(1+(+L.r1||0)/30),(+L.l2||0)*(1+(+L.r2||0)/30))}
function chart(vals){let c=document.createElement('canvas'),ctx=c.getContext('2d');setTimeout(()=>{let w=c.width=c.clientWidth*2,h=c.height=210*2,p=36,m=Math.max(1,...vals);ctx.strokeStyle='#263247';ctx.lineWidth=2;for(let g=0;g<4;g++){let y=p+(h-p*2)*g/3;ctx.beginPath();ctx.moveTo(p,y);ctx.lineTo(w-p,y);ctx.stroke()}ctx.strokeStyle='#8fb8ff';ctx.lineWidth=5;ctx.beginPath();vals.forEach((v,i)=>{let x=p+(w-p*2)*i/11,y=h-p-(h-p*2)*v/m;i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.stroke();ctx.fillStyle='#9aa6b8';ctx.font='22px -apple-system';vals.forEach((v,i)=>{if(i%2===0)ctx.fillText('W'+(i+1),p+(w-p*2)*i/11-10,h-10)})},20);return c}
function renderAnalytics(){let vols=volume(),total=Math.round(vols.reduce((a,b)=>a+b,0)),best=0;Object.values(state.logs).forEach(L=>best=Math.max(best,e1rm(L)));$('analytics').innerHTML=`<div class=card><div class=title>Analytics</div><p class=meta>Updates from saved logs on this phone.</p></div><div class=kpis><div class=kpi><b>${total}</b><br><span class=meta>Total volume</span></div><div class=kpi><b>${Math.round(best)}</b><br><span class=meta>Best e1RM</span></div></div><div class=card><div class=title>Weekly Volume</div><div id=volChart></div></div><div class=card><div class=title>Bodyweight</div><div id=bwChart></div></div>`;$('volChart').appendChild(chart(vols));$('bwChart').appendChild(chart(Array.from({length:12},(_,i)=>+state.bw[i+1]||0)))}
function renderPlan(){let h='<div class=card><div class=title>Plan + Links</div><p class=meta>Main exercise demos and alternate options.</p></div>';EX.forEach(ex=>h+=`<div class=card><div class=title>${ex.name}</div><div><span class=pill>${ex.sets} sets</span><span class=pill>${ex.reps} reps</span><span class=pill>${ex.rest}</span></div><p class=meta>${ex.notes}</p>${altLinks(ex)}</div>`);$('plan').innerHTML=h}
function renderSettings(){$('settings').innerHTML=`<div class=card><div class=title>Backup + Settings</div><p class=meta>Data saves locally on this phone/browser. Export a backup occasionally.</p><label>Units</label><select onchange="state.units=this.value;persist(true);renderWorkout()"><option ${state.units==='lb'?'selected':''}>lb</option><option ${state.units==='kg'?'selected':''}>kg</option></select><button class=primary style="width:100%;margin-top:12px" onclick="persist(true)">Save Now</button><button style="width:100%;margin-top:8px" onclick=exportData()>Export Backup</button><button style="width:100%;margin-top:8px" onclick="$('importer').click()">Import Backup</button></div>`}
function exportData(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.download='minmax-backup.json';a.click()}$('importer').onchange=e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{state=JSON.parse(r.result);persist();renderAll();toast('Imported')};r.readAsText(f)};
function show(v){['workout','plan','analytics','settings'].forEach(x=>$(x).classList.toggle('hidden',x!==v));document.querySelectorAll('.bottom button').forEach(b=>b.classList.toggle('active',b.dataset.v===v));if(v==='workout')renderWorkout();if(v==='plan')renderPlan();if(v==='analytics')renderAnalytics();if(v==='settings')renderSettings();scrollTo(0,0)}document.querySelectorAll('.bottom button').forEach(b=>b.onclick=()=>show(b.dataset.v));function renderAll(){renderWorkout();renderPlan();renderAnalytics();renderSettings()}load();renderAll();
</script></body></html>
