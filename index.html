<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111827">
<title>Min-Max Workout Tracker</title>
<style>
:root{--bg:#f6f1e8;--card:#fffdf8;--ink:#172033;--muted:#667085;--line:#e4d8c6;--accent:#7a5a2f;--accent2:#111827;--good:#167247;--bad:#9f2f2f}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;font-size:16px}body{padding:env(safe-area-inset-top) 0 calc(82px + env(safe-area-inset-bottom))}button,input,select,textarea{font:inherit}button{border:0;border-radius:16px;min-height:48px;padding:12px 14px;font-weight:800;background:#fff;border:1px solid var(--line);color:var(--ink)}button.primary{background:var(--accent);border-color:var(--accent);color:white}button.active{background:var(--ink);color:white}.app{max-width:560px;margin:0 auto;padding:16px}header{padding:10px 2px 12px}h1{font-size:28px;letter-spacing:-.04em;line-height:1.05;margin:0 0 8px}.sub{color:var(--muted);line-height:1.35;margin:0}.card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:0 8px 22px rgba(30,22,10,.06);padding:15px;margin:12px 0}.row{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px}.row button{white-space:nowrap;min-width:62px}.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}label{display:block;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em;font-weight:800;margin:0 0 5px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;min-height:48px;padding:10px 12px;background:white;color:var(--ink)}textarea{min-height:84px}.title{font-size:20px;font-weight:900;letter-spacing:-.02em}.meta{color:var(--muted);font-size:14px;line-height:1.35;margin-top:5px}.pill{display:inline-block;background:#f3eadc;border:1px solid var(--line);border-radius:999px;padding:5px 9px;margin:6px 5px 0 0;font-size:13px;color:#5f4727;font-weight:800}.bottom{position:fixed;left:0;right:0;bottom:0;background:rgba(255,253,248,.97);backdrop-filter:blur(10px);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px max(8px,env(safe-area-inset-left)) calc(8px + env(safe-area-inset-bottom)) max(8px,env(safe-area-inset-right));z-index:20}.bottom button{font-size:12px;line-height:1.1;min-height:50px;padding:8px 4px;border-radius:14px}.hidden{display:none!important}.links a{display:block;margin-top:8px;padding:11px 12px;background:#f7efe3;border:1px solid var(--line);border-radius:14px;color:#5f4727;text-decoration:none;font-weight:800}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px}.kpi{background:white;border:1px solid var(--line);border-radius:18px;padding:14px}.kpi b{font-size:24px}.toast{position:fixed;left:16px;right:16px;bottom:92px;background:#172033;color:white;padding:12px 14px;border-radius:16px;text-align:center;font-weight:800;opacity:0;transform:translateY(10px);transition:.2s;z-index:50}.toast.show{opacity:1;transform:translateY(0)}canvas{width:100%;height:210px;background:white;border:1px solid var(--line);border-radius:16px}</style>
</head>
<body>
<div class="app">
<header><h1>Min-Max 4x Workout Tracker</h1><p class="sub">Mobile-first gym logger. This hosted version is designed to run in Safari/Chrome instead of a blocked file preview.</p></header>
<section id="workout"></section><section id="plan" class="hidden"></section><section id="analytics" class="hidden"></section><section id="settings" class="hidden"></section>
</div>
<nav class="bottom"><button data-v="workout" class="active">Log<br>Workout</button><button data-v="plan">Plan<br>Links</button><button data-v="analytics">Stats<br>Progress</button><button data-v="settings">Backup<br>Settings</button></nav><input id="importer" type="file" accept="application/json" hidden><div id="toast" class="toast"></div>
<script>
const EX=[
{name:'Lying Leg Curl',sets:2,reps:'6-8',rir:'1/0',rest:'1-2 min',link:'https://youtu.be/y28L1m1PYUQ',notes:'Set the machine for a deep stretch. Keep hips down.'},
{name:'Squat - Your Choice',sets:2,reps:'6-8',rir:'3/2',rest:'3-5 min',link:'https://youtu.be/v3N4tpPpmyQ',notes:'Back squat, front squat, hack squat, belt squat, or Smith squat.'},
{name:'Barbell Incline Press',sets:2,reps:'6-8',rir:'2/1',rest:'3-5 min',link:'https://youtu.be/ad0NL7TH2-I',notes:'Pause one second at the bottom while maintaining pec tension.'},
{name:'Incline DB Y-Raise',sets:1,reps:'8-10',rir:'0',rest:'1-2 min',link:'https://youtu.be/xaOQJjzNrd8',notes:'Use a 30 degree incline bench and raise in a Y path.'},
{name:'Lat Pulldown',sets:2,reps:'8-10',rir:'2/1',rest:'2-3 min',link:'https://youtu.be/O94yEoGXtBY',notes:'Drive elbows down and keep tension on the lats.'},
{name:'Romanian Deadlift',sets:2,reps:'6-8',rir:'2/1',rest:'3-5 min',link:'https://youtu.be/_oyxCn2iSjU',notes:'Hinge at the hips and control the stretch.'},
{name:'Cable Row',sets:2,reps:'8-10',rir:'1/0',rest:'2-3 min',link:'https://youtu.be/GZbfZ033f74',notes:'Pull elbows back and avoid excessive momentum.'},
{name:'DB Lateral Raise',sets:2,reps:'10-15',rir:'1/0',rest:'1-2 min',link:'https://youtu.be/v_ZkxWzYnMc',notes:'Lead with elbows and keep traps relaxed.'},
{name:'Leg Press',sets:2,reps:'8-10',rir:'2/1',rest:'3-5 min',link:'https://youtu.be/yZmx_Ac3880',notes:'Use controlled depth and stable hips.'},
{name:'Cable Triceps Pressdown',sets:2,reps:'10-12',rir:'1/0',rest:'1-2 min',link:'https://youtu.be/6Fzep104f0s',notes:'Keep elbows fixed and extend fully.'},
{name:'Incline DB Curl',sets:2,reps:'10-12',rir:'1/0',rest:'1-2 min',link:'https://youtu.be/soxrZlIl35U',notes:'Let biceps stretch at the bottom.'},
{name:'Standing Calf Raise',sets:2,reps:'8-12',rir:'1/0',rest:'1-2 min',link:'https://youtu.be/3UWi44yN-wM',notes:'Pause in the stretched and contracted positions.'}
];
const SESS=['Full Body A','Full Body B','Upper Focus','Lower Focus'];
let state={week:1,session:0,logs:{},bw:{},units:'lb'};
function $(id){return document.getElementById(id)}function key(i){return 'w'+state.week+'s'+state.session+'e'+i}function toast(t){$('toast').textContent=t;$('toast').className='toast show';setTimeout(()=>$('toast').className='toast',1500)}function save(){localStorage.setItem('rookieMinMax',JSON.stringify(state));toast('Saved')}function load(){try{state=Object.assign(state,JSON.parse(localStorage.getItem('rookieMinMax')||'{}'))}catch(e){}}
function tabs(label,current,count,fn){let h='<div class=row>';for(let i=1;i<=count;i++)h+=`<button class="${i===current?'active':''}" onclick="${fn}(${i})">${label} ${i}</button>`;return h+'</div>'}
window.setWeek=i=>{state.week=i;renderWorkout();save()};window.setSession=i=>{state.session=i;renderWorkout();save()};
function renderWorkout(){let h='<div class=card><label>Week</label>'+tabs('W',state.week,12,'setWeek')+'<label style="margin-top:12px">Workout Day</label><div class=row>';SESS.forEach((s,i)=>h+=`<button class="${i===state.session?'active':''}" onclick="setSession(${i})">${s}</button>`);h+=`</div><div style="margin-top:12px"><label>Bodyweight (${state.units})</label><input inputmode=decimal value="${state.bw[state.week]||''}" oninput="state.bw[state.week]=this.value;localStorage.setItem('rookieMinMax',JSON.stringify(state))" placeholder="Optional"></div></div>`;EX.forEach((ex,i)=>{let L=state.logs[key(i)]||{};h+=`<div class=card><div class=title>${ex.name}</div><div class=meta><span class=pill>${ex.sets} sets</span><span class=pill>${ex.reps} reps</span><span class=pill>RIR ${ex.rir}</span><span class=pill>${ex.rest}</span></div><div class=grid style="margin-top:12px"><div><label>Set 1 Load</label><input inputmode=decimal data-i=${i} data-f=l1 value="${L.l1||''}"></div><div><label>Set 1 Reps</label><input inputmode=numeric data-i=${i} data-f=r1 value="${L.r1||''}"></div><div><label>Set 1 RIR</label><input inputmode=decimal data-i=${i} data-f=rir1 value="${L.rir1||''}"></div><div><label>Set 2 Load</label><input inputmode=decimal data-i=${i} data-f=l2 value="${L.l2||''}"></div><div><label>Set 2 Reps</label><input inputmode=numeric data-i=${i} data-f=r2 value="${L.r2||''}"></div><div><label>Set 2 RIR</label><input inputmode=decimal data-i=${i} data-f=rir2 value="${L.rir2||''}"></div></div><label style="margin-top:12px">Notes</label><textarea data-i=${i} data-f=notes>${L.notes||''}</textarea><div class=links><a target=_blank rel=noopener href="${ex.link}">Open exercise demo</a></div><p class=meta>${ex.notes}</p></div>`});$('workout').innerHTML=h;document.querySelectorAll('[data-i]').forEach(el=>el.oninput=()=>{let k=key(el.dataset.i);state.logs[k]=state.logs[k]||{};state.logs[k][el.dataset.f]=el.value;localStorage.setItem('rookieMinMax',JSON.stringify(state))})}
function volume(){let v=Array(12).fill(0);for(let w=1;w<=12;w++)for(let s=0;s<4;s++)EX.forEach((ex,i)=>{let L=state.logs['w'+w+'s'+s+'e'+i]||{};v[w-1]+=(+L.l1||0)*(+L.r1||0)+(+L.l2||0)*(+L.r2||0)});return v}function e1rm(L){let a=(+L.l1||0)*(1+(+L.r1||0)/30),b=(+L.l2||0)*(1+(+L.r2||0)/30);return Math.max(a,b)}
function chart(vals){let c=document.createElement('canvas'),ctx=c.getContext('2d');setTimeout(()=>{let w=c.width=c.clientWidth*2,h=c.height=210*2,p=36,m=Math.max(1,...vals);ctx.strokeStyle='#e4d8c6';ctx.lineWidth=2;for(let g=0;g<4;g++){let y=p+(h-p*2)*g/3;ctx.beginPath();ctx.moveTo(p,y);ctx.lineTo(w-p,y);ctx.stroke()}ctx.strokeStyle='#7a5a2f';ctx.lineWidth=5;ctx.beginPath();vals.forEach((v,i)=>{let x=p+(w-p*2)*i/11,y=h-p-(h-p*2)*v/m;i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.stroke();ctx.fillStyle='#667085';ctx.font='22px -apple-system';vals.forEach((v,i)=>{if(i%2===0)ctx.fillText('W'+(i+1),p+(w-p*2)*i/11-10,h-10)})},20);return c}
function renderAnalytics(){let vols=volume(),total=Math.round(vols.reduce((a,b)=>a+b,0)),best=0;Object.values(state.logs).forEach(L=>best=Math.max(best,e1rm(L)));let h=`<div class=card><div class=title>Analytics</div><p class=sub>Updates from saved logs on this phone.</p></div><div class=kpis><div class=kpi><b>${total}</b><br><span class=meta>Total volume</span></div><div class=kpi><b>${Math.round(best)}</b><br><span class=meta>Best e1RM</span></div></div><div class=card><div class=title>Weekly Volume</div><div id=volChart></div></div><div class=card><div class=title>Bodyweight</div><div id=bwChart></div></div>`;$('analytics').innerHTML=h;$('volChart').appendChild(chart(vols));$('bwChart').appendChild(chart(Array.from({length:12},(_,i)=>+state.bw[i+1]||0)))}
function renderPlan(){let h='<div class=card><div class=title>Plan + Links</div><p class=sub>This first hosted build includes the mobile workout flow and core exercise demos. I will port the full spreadsheet data next.</p></div>';EX.forEach(ex=>h+=`<div class=card><div class=title>${ex.name}</div><div class=meta><span class=pill>${ex.sets} sets</span><span class=pill>${ex.reps} reps</span><span class=pill>${ex.rest}</span></div><p class=meta>${ex.notes}</p><div class=links><a target=_blank href="${ex.link}">Open demo</a></div></div>`);$('plan').innerHTML=h}
function renderSettings(){let h=`<div class=card><div class=title>Backup + Settings</div><p class=sub>Use this from the GitHub Pages URL. Add it to your phone Home Screen for gym use.</p><label>Units</label><select onchange="state.units=this.value;save();renderWorkout()"><option ${state.units==='lb'?'selected':''}>lb</option><option ${state.units==='kg'?'selected':''}>kg</option></select><button class=primary style="width:100%;margin-top:12px" onclick=save()>Save Now</button><button style="width:100%;margin-top:8px" onclick=exportData()>Export Backup</button><button style="width:100%;margin-top:8px" onclick="$('importer').click()">Import Backup</button></div>`;$('settings').innerHTML=h}
function exportData(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.download='minmax-backup.json';a.click()}$('importer').onchange=e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{state=JSON.parse(r.result);localStorage.setItem('rookieMinMax',JSON.stringify(state));renderAll();toast('Imported')};r.readAsText(f)};
function show(v){['workout','plan','analytics','settings'].forEach(x=>$(x).classList.toggle('hidden',x!==v));document.querySelectorAll('.bottom button').forEach(b=>b.classList.toggle('active',b.dataset.v===v));if(v==='workout')renderWorkout();if(v==='plan')renderPlan();if(v==='analytics')renderAnalytics();if(v==='settings')renderSettings();scrollTo(0,0)}document.querySelectorAll('.bottom button').forEach(b=>b.onclick=()=>show(b.dataset.v));function renderAll(){renderWorkout();renderPlan();renderAnalytics();renderSettings()}load();renderAll();
</script></body></html>
